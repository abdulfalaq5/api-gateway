services:
  kong:
    image: kong:3.4
    container_name: kong-gateway-dev
    environment:
      # Use db-less mode for development
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      # Listen addresses
      KONG_PROXY_LISTEN: 0.0.0.0:9530
      KONG_ADMIN_LISTEN: 0.0.0.0:9529
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:9543
      # Logging
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_GUI_ERROR_LOG: /dev/stderr
      # Timeout settings
      KONG_PROXY_CONNECT_TIMEOUT: 60000
      KONG_PROXY_SEND_TIMEOUT: 60000
      KONG_PROXY_READ_TIMEOUT: 60000
      KONG_UPSTREAM_CONNECT_TIMEOUT: 60000
      KONG_UPSTREAM_SEND_TIMEOUT: 60000
      KONG_UPSTREAM_READ_TIMEOUT: 60000
    ports:
      - "9530:9530"
      - "9529:9529"
      - "9543:9543"
    volumes:
      - ./config/kong.yml:/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway-dev"
