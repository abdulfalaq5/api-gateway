_format_version: "3.0"
_transform: true

services:
  - name: sso-service
    host: api-gate.motorsights.com
    port: 443
    protocol: https
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: sso-menus-routes
        paths:
          - /api/menus
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: true
      - name: sso-userinfo-routes
        paths:
          - /api/auth/sso/userinfo
        methods:
          - GET
          - OPTIONS
        strip_path: true
      - name: sso-login-routes
        paths:
          - /api/auth/sso/login
        methods:
          - POST
          - OPTIONS
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          header_name: null
          path: null
          policy: local
          fault_tolerant: true
          redis_password: null
          redis_username: null
          redis_server_name: null
          error_code: 429
          error_message: API rate limit exceeded
          sync_rate: -1
          redis_host: null
          hide_client_headers: false
          redis_port: 6379
          redis_database: 0
          second: null
          minute: 100
          hour: 1000
          day: null
          month: null
          year: null
          limit_by: consumer
          redis_timeout: 2000
          redis_ssl: false
          redis_ssl_verify: false

  - name: example-service
    host: localhost
    port: 3000
    protocol: http
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: example-route
        paths:
          - /api/v1/example
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: true
    plugins:

plugins:
