_format_version: "3.0"
_transform: true

services:
  - name: example-service
    url: http://localhost:3000
    routes:
      - name: example-route
        paths:
          - /api/v1/example
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false

consumers:
  - username: api-consumer
    custom_id: api-consumer-001
    keyauth_credentials:
      - key: your-api-key-here
