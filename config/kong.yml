_format_version: "3.0"
_transform: true

services:
  - name: example-service
    url: http://localhost:3000
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: example-route
        paths:
          - /api/v1/example
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: true

  - name: sso-service
    url: https://api-gate.motorsights.com
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: sso-login-routes
        paths:
          - /api/auth/sso/login
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: sso-logout-routes
        paths:
          - /api/auth/sso/logout
        methods:
          - GET
          - OPTIONS
        strip_path: false
      - name: sso-userinfo-routes
