_format_version: "3.0"
_transform: true


consumers:
  - username: sso-issuer
    jwt_secrets:
      - key: https://sso.company.com
        secret: ${JWT_SECRET}
        algorithm: HS256
      - key: http://localhost:3000
        secret: ${JWT_SECRET}
        algorithm: HS256

services:
  - name: sso-service
    url: http://api-gate-sso:9601
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000

    routes:
      - name: sso-login-route
        paths:
          - /api/auth/sso/login
        methods:
          - POST
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              hour: 100
              policy: local
      - name: sso-logout-route
        paths:
          - /api/auth/sso/logout
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 999999999
              hour: 999999999
              policy: local
      - name: sso-userinfo-route
        paths:
          - /api/auth/sso/userinfo
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 999999999
              hour: 999999999
              policy: local
      - name: sso-profile-route
        paths:
          - /api/auth/sso/profil
        methods:
          - GET
          - PUT
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 999999999
              hour: 999999999
              policy: local
      - name: sso-menus-route
        paths:
          - /api/menus
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              run_on_preflight: false
          - name: pre-function
            config:
              access:
                - |
                  local jwt_parser = require "kong.plugins.jwt.jwt_parser"
                  local token = kong.request.get_header("Authorization")
                  if token then
                    local _, _, jwt_token = string.find(token, "Bearer%s+(.+)")
                    if jwt_token then
                      local jwt = jwt_parser:new(jwt_token)
                      local claims = jwt.claims
                      if claims then
                        if claims.user_id then
                          kong.service.request.set_header("X-User-Id", claims.user_id)
                        end
                        if claims.employee_id then
                          kong.service.request.set_header("X-Employee-Id", claims.employee_id)
                        end
                      end
                    end
                  end
          - name: rate-limiting
            config:
              minute: 999999999
              hour: 999999999
              policy: local
      - name: sso-menus-get-route
        paths:
          - /api/menus/get
        methods:
          - POST
          - OPTIONS
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              run_on_preflight: false
          - name: pre-function
            config:
              access:
                - |
