        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: sso-departments-routes
        paths:
          - /api/departments
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
      - name: sso-departments-get-routes
        paths:
