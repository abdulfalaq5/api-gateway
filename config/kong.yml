_format_version: "3.0"
_transform: true

services:
  - name: example-service
    url: http://localhost:3000
    routes:
      - name: example-route
        paths:
          - /api/v1/example
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: true

  - name: sso-service
    url: http://host.docker.internal:9518
    routes:
      - name: sso-login-routes
        paths:
          - /api/auth/sso/login
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: sso-userinfo-routes
        paths:
          - /api/auth/sso/userinfo
        methods:
          - GET
          - OPTIONS
        strip_path: true
      - name: sso-menus-routes
        paths:
          - /api/menus
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Auth-Token
      exposed_headers:
        - X-Auth-Token
        - Authorization
      credentials: true
      max_age: 3600
      preflight_continue: false