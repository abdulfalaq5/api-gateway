        strip_path: false
      - name: sso-employees-create-routes
        paths:
          - /api/employees/create
        methods:
          - POST
          - OPTIONS
        strip_path: false
      - name: sso-roles-routes
        paths:
          - /api/roles
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
      - name: sso-roles-get-routes
        paths:
          - /api/roles/get
        methods:
