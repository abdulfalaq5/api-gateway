          - /api/auth/sso/profil
        methods:
          - GET
          - PUT
          - OPTIONS
        strip_path: false
      - name: sso-menus-routes
        paths:
          - /api/menus
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
      - name: sso-menus-get-routes
        paths:
          - /api/menus/get
        methods:
          - POST
          - OPTIONS
        strip_path: false
