# Nginx Configuration untuk Kong API Gateway
# File ini digunakan sebagai reverse proxy untuk Kong Gateway
# Cloudflare Tunnel akan mengarahkan traffic ke Nginx, lalu Nginx forward ke Kong
#
# CATATAN PENTING:
# - File ini perlu diintegrasikan ke Nginx yang sudah ada di repository terpisah
# - Nginx sudah terhubung ke network Docker 'infra_net' yang sama dengan Kong
# - Mount file ini ke /etc/nginx/conf.d/kong.conf atau include di nginx.conf
# - Setelah update, reload Nginx: docker exec <nginx-container> nginx -s reload

# Upstream untuk Kong Proxy (port 9545)
upstream kong_proxy {
    server kong-gateway:9545;
    keepalive 64;
}

# Upstream untuk Kong Admin API (port 9546)
upstream kong_admin {
    server kong-gateway:9546;
    keepalive 64;
}

# Upstream untuk Kong Admin GUI (port 9547)
upstream kong_admin_gui {
    server kong-gateway:9547;
    keepalive 64;
}

# Server block untuk Kong Proxy API (gateway.motorsights.com)
server {
    listen 80;
    server_name gateway.motorsights.com;

    # Logging
    access_log /var/log/nginx/kong-proxy-access.log;
    error_log /var/log/nginx/kong-proxy-error.log;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Forward semua request ke Kong Proxy
    location / {
        proxy_pass http://kong_proxy;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

