services:
  kong:
    image: kong:3.4
    container_name: kong-gateway
    environment:
      # Use db-less mode for server deployment
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      # Listen addresses
      KONG_PROXY_LISTEN: 0.0.0.0:9545
      KONG_ADMIN_LISTEN: 0.0.0.0:9546
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:9547
      # Logging
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_GUI_ERROR_LOG: /dev/stderr
      # Timeout settings
      KONG_PROXY_CONNECT_TIMEOUT: 60000
      KONG_PROXY_SEND_TIMEOUT: 60000
      KONG_PROXY_READ_TIMEOUT: 60000
      KONG_UPSTREAM_CONNECT_TIMEOUT: 60000
      KONG_UPSTREAM_SEND_TIMEOUT: 60000
      KONG_UPSTREAM_READ_TIMEOUT: 60000
      # DNS Configuration
      # Gunakan Docker internal DNS (127.0.0.11) untuk resolve container names
      # Fallback ke DNS eksternal untuk internet access
      KONG_DNS_RESOLVER: "127.0.0.11:53,8.8.8.8:53,8.8.4.4:53"
      KONG_DNS_ORDER: "LAST,A,CNAME"
    volumes:
      - ./config/kong.yml:/kong/kong.yml:ro
      - ./config/resolv.conf:/etc/resolv.conf:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    ports:
      - "127.0.0.1:9545:9545"   # PROXY
      - "127.0.0.1:9546:9546"   # ADMIN API
      - "127.0.0.1:9547:9547"   # ADMIN GUI
    networks:
      - infra_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  infra_net:
    external: true
    name: infra_net
