services:
  postgres:
    image: postgres:13
    container_name: kong-database
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
    volumes:
      - kong_data:/var/lib/postgresql/data
    networks:
      - infra_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  kong:
    image: kong:3.4
    container_name: kong-gateway
    env_file:
      - .env
    environment:
      # Database Mode
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
      
      KONG_UNTRUSTED_LUA: "on"
      # Listen addresses
      KONG_PROXY_LISTEN: 0.0.0.0:9545
      KONG_ADMIN_LISTEN: 0.0.0.0:9546
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:9547
      # Logging
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_GUI_ERROR_LOG: /dev/stderr
      # Timeout settings
      KONG_PROXY_CONNECT_TIMEOUT: 60000
      KONG_PROXY_SEND_TIMEOUT: 60000
      KONG_PROXY_READ_TIMEOUT: 60000
      KONG_UPSTREAM_CONNECT_TIMEOUT: 60000
      KONG_UPSTREAM_SEND_TIMEOUT: 60000
      KONG_UPSTREAM_READ_TIMEOUT: 60000
      # DNS Configuration
      KONG_DNS_RESOLVER: "127.0.0.11:53,8.8.8.8:53,8.8.4.4:53"
      KONG_DNS_ORDER: "LAST,A,CNAME"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/kong/config
      - ./config/resolv.conf:/etc/resolv.conf:ro
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    ports:
      - "127.0.0.1:9545:9545" # PROXY
      - "127.0.0.1:9546:9546" # ADMIN API
      - "127.0.0.1:9547:9547" # ADMIN GUI
    networks:
      - infra_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  kong_data:

networks:
  infra_net:
    external: true
    name: infra_net
